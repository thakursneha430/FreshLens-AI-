<!DOCTYPE html>
<html>
<head>
    <title>FreshLens AI 🍎</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:Poppins;
            background: linear-gradient(135deg,#56ab2f,#a8e063);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
            text-align:center;
            width:420px;
        }

        h1{
            color:#2e7d32;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input[type="file"]{
            margin:20px 0;
        }

        button{
            background:#56ab2f;
            border:none;
            padding:14px 28px;
            font-size:18px;
            color:white;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2e7d32;
        }

        .emoji{
            font-size:60px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="emoji">🍎🍌🍊🤖</div>
    <h1>FreshLens AI</h1>
    <p>Upload a food or fruit image and AI will tell if it's Fresh 🟢 or Rotten 🔴</p>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">✨ Predict Now</button>
    </form>
</div>

</body>
</html>
