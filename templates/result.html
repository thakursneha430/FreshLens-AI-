<!DOCTYPE html>
<html>
<head>
    <title>Result 🍎</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:Poppins;
            background: linear-gradient(135deg,#ff9966,#ff5e62);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
            text-align:center;
            width:450px;
        }

        h1{
            color:#ff5e62;
        }

        img{
            margin-top:15px;
            border-radius:15px;
        }

        a{
            text-decoration:none;
            display:inline-block;
            margin-top:20px;
            background:#ff9966;
            padding:12px 22px;
            color:white;
            border-radius:12px;
        }

        a:hover{
            background:#ff5e62;
        }

        .emoji{
            font-size:60px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="emoji">🔍🤖</div>
    <h1>Prediction: {{ prediction }}</h1>

    <img src="{{ image_path }}" width="300">

    <br>
    <a href="/">⬅ Try another image</a>
</div>

</body>
</html>
